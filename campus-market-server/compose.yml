services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: Asia/Hong_Kong
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: campus_market
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init-clean.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Hong_Kong
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/campus_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      UPLOAD_PATH: /app/upload
    expose:
      - "8080"
    volumes:
      - upload_data:/app/upload

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      additional_contexts:
        web-dist: ../campus-market-web/dist
        admin-dist: ../campus-market/web-admin/dist
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql_data:
  upload_data:
