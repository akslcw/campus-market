server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:replace-with-a-strong-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 604800
  is-share: false
  token-style: jwt-simple
  jwt-secret-key: ${JWT_SECRET_KEY:campus-market-secret-2024}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-pro}
  timeout: ${DEEPSEEK_TIMEOUT:30000}

# 图片上传本地存储（Nginx 静态资源映射）
upload:
  path: ${UPLOAD_PATH:./upload}
  url-prefix: ${UPLOAD_URL_PREFIX:/static}

logging:
  level:
    com.campus.market: debug

# SpringDoc OpenAPI（Apifox 一键导入: http://localhost:8080/v3/api-docs）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json
